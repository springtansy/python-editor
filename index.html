<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Python Editor</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v314.0.2/full/pyodide.js"></script>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #24292e;
      --keyword: #d73a49;
      --string: #e67e22; 
      --comment: #6a737d;
      --builtin: #005cc5;
      --line-num-bg: #f8f8f8;
      --line-num-text: #999;
      --accent-green: #28a745;
      --accent-red: #cb2431;
      --accent-blue: #0366d6;
    }

    body { font-family: -apple-system, system-ui, sans-serif; margin: 20px; background: #eee; color: #333; }
    h2 { margin-top: 0; font-weight: 600; }

    .editor-container {
      display: flex;
      position: relative;
      width: 100%;
      height: 450px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: var(--bg-color);
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .language-select {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: white;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .language-select:hover {
      background: #f6f8fa;
    }

    .language-select:focus {
      outline: none;
      border-color: var(--accent-blue);
    }

    #line-numbers {
      width: 45px;
      padding: 15px 5px;
      background: var(--line-num-bg);
      color: var(--line-num-text);
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      text-align: right;
      user-select: none;
      border-right: 1px solid #ddd;
      overflow: hidden;
    }

    .editor-wrapper {
      position: relative;
      flex-grow: 1;
      height: 100%;
    }

    #code, #highlighter {
      margin: 0;
      padding: 15px;
      font-family: 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre;
      word-wrap: normal;
      overflow-x: auto;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      outline: none;
      border: none;
    }

    #code {
      z-index: 2;
      background: transparent;
      color: transparent;
      caret-color: #333;
      resize: none;
    }

    #highlighter {
      z-index: 1;
      color: var(--text-color);
      pointer-events: none;
    }

    /* Syntax Highlighting */
    .hl-keyword { color: var(--keyword); font-weight: bold; }
    .hl-string  { color: var(--string); }
    .hl-comment { color: var(--comment); font-style: italic; }
    .hl-builtin { color: var(--builtin); }

    .controls { margin: 15px 0; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    
    button { 
      padding: 8px 16px; 
      cursor: pointer; 
      border-radius: 4px; 
      border: 1px solid #ccc; 
      background: white; 
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    button:hover { background: #f0f0f0; }

    #runBtn { background: var(--accent-green); color: white; border-color: #218838; }
    #runBtn:hover { background: #218838; }
    #runBtn:disabled { background: #94d3a2; cursor: wait; }

    #stopBtn { color: var(--accent-red); border-color: #d1d1d1; }
    
    .btn-upload { color: var(--accent-blue); }

    .shortcut-hint { font-size: 12px; color: #888; margin-left: 2px; }
    .spacer { flex-grow: 1; }

    pre#output { 
      background: #1e1e1e; color: #f0f0f0; padding: 15px; border-radius: 6px; 
      min-height: 120px; max-height: 300px; overflow-y: auto; font-family: 'Courier New', monospace;
      border: 1px solid #333; line-height: 1.4;
    }
  </style>
</head>
<body>

<div style="display:flex;align-items:center;margin-bottom:15px;">
    <h2 id="title" style="margin:0;">Python Editor</h2>

    <div class="spacer"></div>

    <select id="language" class="language-select">
        <option value="sv">Svenska</option>
        <option value="fi">Suomi</option>
        <option value="en">English</option>
    </select>
</div>

<div class="editor-container">
  <div id="line-numbers"></div>
  <div class="editor-wrapper">
    <div id="highlighter"></div>
    <textarea id="code" spellcheck="false" wrap="off">print("Hello world!")</textarea>
  </div>
</div>

<div class="controls">
  <button id="runBtn" onclick="runCode()" disabled>Loading...</button>
  <button id="stopBtn" onclick="resetEngine()">Stop / Reset</button>
  <span class="shortcut-hint">(Ctrl + Enter)</span>
  
  <div class="spacer"></div>
  
  <input type="file" id="fileInput" hidden accept=".py,.txt" onchange="handleFileUpload(event)">
  <button id="uploadBtn" onclick="document.getElementById('fileInput').click()" class="btn-upload">Upload</button>
  <button id="copyBtn" onclick="copyCode()">Copy</button>
  <button id="downloadBtn" onclick="downloadCode()">Download</button>
  <button id="clearBtn" onclick="clearEditor()" style="color: #888;">Clear</button>
</div>

<h3 id="outputTitle">Output:</h3>
<pre id="output">Starting Python engine...</pre>

<footer style="margin-top:20px;padding:16px 0;text-align:center;font-size:12px;color:#6a737d;border-top:1px solid #e1e4e8;">

    View source on GitHub
  </a>
</footer>
<script src="main.js"></script>
</body>
</html>
